<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="プログラミングの学習ロードマップ" />
    <title>ねこプロ</title>
    <!-- css -->
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <link rel="stylesheet" href="css/index.css" />
    <!-- フォント -->
    <link
      href="https://fonts.googleapis.com/css?family=M+PLUS+Rounded+1c"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Sawarabi+Gothic"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <h1>ねこプロ</h1>
      <p>日本初のねこのように学ぶプログラミング学習コミュニティ</p>
    </header>
    <main>
      <section>
        <h2 class="h2">ねこプロ入会お申し込み</h2>
        <img src="image/image01.jpeg" alt="" class="image01" />
        <table border="1" class="table">
          <tr>
            <th>プラン</th>
            <th>料金</th>
            <th>割引</th>
          </tr>
          <tr>
            <td>のんびりプラン</td>
            <td>980円</td>
            <td rowspan="2">学生は半額</td>
          </tr>
          <tr>
            <td>わくわくプラン</td>
            <td>2000円</td>
          </tr>
        </table>

        <form action="post">
          <div>
            プラン選択：
            <select name="plan">
              <option value="plan">のんびりプラン</option>
              <option value="plan">わくわくプラン</option>
            </select>
          </div>
          <div>
            名前：
            <input type="text" placeholder="名字　名前" />
            <input type="radio" name="gender" value="男" />男
            <input type="radio" name="gender" value="女" />女
          </div>
          <div>
            血液型：
            <select name="bloodtype">
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="O">O</option>
              <option value="AB">AB</option>
              <option value="不明">不明</option>
            </select>
          </div>
          <div>
            得意な言語：
            <input type="checkbox" name="language" value="Java" />Java
            <input
              type="checkbox"
              name="language"
              value="JavaScript"
            />JavaScript
            <input type="checkbox" name="language" value="Python" />Python
            <input type="checkbox" name="language" value="C" />C
            <input type="checkbox" name="language" value="Ruby" />Ruby
            <input type="checkbox" name="language" value="PHP" />PHP
            <input type="checkbox" name="language" value="Go" />Go
          </div>
          <div>
            コメント<br />
            <textarea name=""> </textarea>
          </div>
          <input type="submit" value="申し込む" />
        </form>
        <a href="guideline.html" class="btn">ガイドライン</a>
      </section>
    </main>
    <footer>
      <p>Copyright 2021 nekopuro</p>
    </footer>
  </body>
</html>
